name: CI/CD Pipeline — Gestion des Stocks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : SonarQube Analysis (BLOQUANT)
  # ─────────────────────────────────────────
  sonarqube:
    name: 🔍 SonarQube Analysis
    runs-on: ubuntu-latest
    continue-on-error: false   # ← CHANGÉ : bloque si Quality Gate échoue
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: SonarQube Scan
        run: |
          cd backend
          mvn sonar:sonar \
            -Dsonar.projectKey=Gestion-Stocks \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true   # ← AJOUTÉ : attend le Quality Gate

  # ─────────────────────────────────────────
  # JOB 2 : Tests Backend
  # ─────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run unit tests
        run: |
          cd backend
          mvn test -B
      - name: Run integration tests
        run: |
          cd backend
          mvn verify -B -DskipUnitTests   # ← AJOUTÉ : tests d'intégration
      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests -B
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ─────────────────────────────────────────
  # JOB 3 : Tests Frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci   # ← CHANGÉ : plus fiable que npm install
      - name: Run unit tests
        run: |
          cd frontend
          npm run test -- --watch=false --browsers=ChromeHeadless
      - name: Build Angular
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────
  # JOB 4 : Security Scan (AJOUTÉ)
  # ─────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ─────────────────────────────────────────
  # JOB 5 : Build & Push Docker Images
  # ─────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          push: true
          cache-from: type=gha   # ← AJOUTÉ : cache Docker
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 6 : Deploy on Kubernetes (CORRIGÉ)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy on Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
      - name: Update image tags in manifests
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/frontend-deployment.yaml
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n gestion-stocks --timeout=120s
          kubectl rollout status deployment/frontend -n gestion-stocks --timeout=120s
      - name: Verify deployment
        run: |
          kubectl get pods -n gestion-stocks
          kubectl get services -n gestion-stocks
          echo "🎉 Déploiement Kubernetes terminé !"

  # ─────────────────────────────────────────
  # JOB 7 : Notifications (AJOUTÉ)
  # ─────────────────────────────────────────
  notify:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Pipeline ${{ job.status }}: ${{ github.repository }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
