name: CI/CD Pipeline — Gestion des Stocks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : SonarQube Analysis (optionnel)
  # ─────────────────────────────────────────
  sonarqube:
    name: 🔍 SonarQube Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: SonarQube Scan
        continue-on-error: true
        run: |
          cd backend
          mvn sonar:sonar \
            -Dsonar.projectKey=Gestion-Stocks \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 2 : Tests Backend
  # ─────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    needs: sonarqube
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: |
          cd backend
          mvn test -B

      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ─────────────────────────────────────────
  # JOB 3 : Tests Frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest
    needs: sonarqube
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Angular
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────
  # JOB 4 : Build & Push Docker Images
  # ─────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 5 : Deploy on Kubernetes (CORRIGÉ)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy on Kubernetes
    runs-on: self-hosted
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubeconfig (Minikube)
        run: |
          minikube update-context
          echo "KUBECONFIG=/home/hajer/.kube/config" >> $GITHUB_ENV

      - name: Update image tags in manifests
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml --validate=false
          kubectl apply -f k8s/ --validate=false

      - name: Wait for rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/backend -n gestion-stocks --timeout=300s
          kubectl rollout status deployment/frontend -n gestion-stocks --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n gestion-stocks
          kubectl get services -n gestion-stocks
          echo "🎉 Déploiement Kubernetes terminé !"
