apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gestion-stocks-ingress
  namespace: gestion-stocks
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: gestion-stocks.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8081
